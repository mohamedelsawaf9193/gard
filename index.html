<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الترقيات</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap');

*{
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

margin:0;
height:100vh;

display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
url("https://raw.githubusercontent.com/xhhp1/mechanics/main/images/mechan.png");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

color:white;

}
.container{
width:1000px;
text-align:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:35px;
border-radius:16px;
box-shadow:0 0 40px rgba(0,0,0,.5);
}

h1{margin-top:0}

textarea{
width:100%;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
background:#020617;
color:#e2e8f0;
padding:15px;
resize:none;
}

#input{
height:200px;
margin-bottom:20px;
}

button{
background:linear-gradient(135deg,#3b82f6,#2563eb);
border:none;
padding:10px 18px;
border-radius:8px;
color:white;
cursor:pointer;
margin:5px;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}

.tab{
background:#1e293b;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

.tab.active{
background:#2563eb;
}

.tabContent{
display:none;
margin-top:20px;
background:#020617;
border-radius:10px;
padding:20px;
min-height:150px;
color:#22c55e;
direction:ltr;
text-align:left;
}

.tabContent.active{
display:block;
}

.copyBtn{
margin-top:10px;
background:#16a34a;
}

.copyBtn:hover{
background:#22c55e;
}

</style>
</head>

<body>

<div class="container">

<h1>مستوفين شروط الترقيات</h1>

<textarea id="input" placeholder="الصق بيانات الشيت هنا"></textarea>

<button onclick="generate()">إنشاء التقرير</button>

<div class="tabs">
<div class="tab active" onclick="showTab('lvl5',this)">مستوى 5</div>
<div class="tab" onclick="showTab('lvl4',this)">مستوى 4</div>
<div class="tab" onclick="showTab('lvl3',this)">مستوى 3</div>
<div class="tab" onclick="showTab('lvl2',this)">مستوى 2</div>
<div class="tab" onclick="showTab('lvl1',this)">مستوى 1</div>
<div class="tab" onclick="showTab('trainee',this)">متدرب</div>
</div>

<div id="lvl5" class="tabContent active">
<div class="data"></div>
<button class="copyBtn" onclick="copyTab('lvl5')">نسخ</button>
</div>

<div id="lvl4" class="tabContent">
<div class="data"></div>
<button class="copyBtn" onclick="copyTab('lvl4')">نسخ</button>
</div>

<div id="lvl3" class="tabContent">
<div class="data"></div>
<button class="copyBtn" onclick="copyTab('lvl3')">نسخ</button>
</div>

<div id="lvl2" class="tabContent">
<div class="data"></div>
<button class="copyBtn" onclick="copyTab('lvl2')">نسخ</button>
</div>

<div id="lvl1" class="tabContent">
<div class="data"></div>
<button class="copyBtn" onclick="copyTab('lvl1')">نسخ</button>
</div>

<div id="trainee" class="tabContent">
<div class="data"></div>
<button class="copyBtn" onclick="copyTab('trainee')">نسخ</button>
</div>

</div>

<script>

function showTab(id,el){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

document.querySelectorAll(".tabContent").forEach(c=>c.classList.remove("active"))
document.getElementById(id).classList.add("active")

}

function generate(){

const text=document.getElementById("input").value
const lines=text.split("\n")

const groups={
lvl5:[],
lvl4:[],
lvl3:[],
lvl2:[],
lvl1:[],
trainee:[]
}

lines.forEach(line=>{

if(line.includes("في الخدمة") && line.includes("✅") && !line.includes("❌")){

const mention=line.match(/<@\d+>/)
const code=line.match(/G[- ]?(\d+)/)

if(!mention || !code) return

const num=parseInt(code[1])

if(num>=100 && num<=144) groups.lvl5.push(mention[0])
if(num>=145 && num<=184) groups.lvl4.push(mention[0])
if(num>=185 && num<=269) groups.lvl3.push(mention[0])
if(num>=270 && num<=399) groups.lvl2.push(mention[0])
if(num>=400 && num<=699) groups.lvl1.push(mention[0])
if(num>=700) groups.trainee.push(mention[0])

}

})

Object.keys(groups).forEach(level=>{

document.querySelector("#"+level+" .data").innerHTML=
groups[level].join("<br>")

})

}

function copyTab(id){

const text=document.querySelector("#"+id+" .data").innerText

navigator.clipboard.writeText(text)

alert("تم نسخ البيانات")

}

</script>

</body>
</html>
